name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions: {}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    environment: production
    if: ${{ github.ref == 'refs/heads/main' && github.repository_owner == 'adonisjs-atproto' }}
    permissions:
      id-token: write
      pull-requests: write
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.node-version'
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      # Route `pnpm publish` (invoked by `changeset publish`) through a shim
      # that rewrites it to `pnpm stage publish` for npm staged publishing,
      # until changesets supports staging natively (changesets#2025).
      # Requires pnpm >= 11.3 (see packageManager in package.json).
      - name: Enable staged-publishing shim
        run: echo "$GITHUB_WORKSPACE/scripts/changesets-staged-publishing" >> "$GITHUB_PATH"

      - name: Create Release Pull Request or Publish to pnpm
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0

        with:
          title: Prepare release
          commit: prepare release of packages
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: pnpm run release
          version: pnpm run version-packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use OIDC for npm authentication instead of NPM_TOKEN
          NPM_TOKEN: '' # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868
